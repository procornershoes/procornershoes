    <style>
        :root {
            --main-red: #e63946;
            --dark-bg: #1a1a1a;
            --light-bg: #f4f4f4;
            --white: #ffffff;
        }

        body {
            text-align: center;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: #333;
        }

        header {
            background: var(--dark-bg);
            color: var(--white);
            padding: 20px 0;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-weight: 900;
            letter-spacing: 1px;
            font-size: 1.8rem;
        }

        header span { color: var(--main-red); }

        header p {
            margin: 10px 0 0 0;
            font-size: 1rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .shoe-image {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #eee;
        }

        .shoe-image:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .shoe-image img {
            width: 100%;
            height: auto;
            display: block;
            transition: 0.5s;
        }

        .shoe-image:hover img {
            transform: scale(1.05);
        }

        .wh-float, .whatsapp-float-btn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 60px;
            height: 60px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            transition: all 0.3s;
        }

        .wh-float:hover, .whatsapp-float-btn:hover {
            transform: scale(1.1);
            background: #128c7e;
        }

        .wh-float svg, .whatsapp-float-btn svg {
            width: 35px;
            height: 35px;
            fill: white;
        }

        @media (max-width: 480px) {
            header h1 { font-size: 1.4rem; }
            .container { grid-template-columns: 1fr; padding: 15px; }
            .wh-float, .whatsapp-float-btn { width: 50px; height: 50px; right: 15px; bottom: 15px; }
        }
    
.whatsapp-float-btn {
    position: fixed;
    bottom: 40px;
    left: 40px;
    background-color: #25D366;
    color: white;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    z-index: 1000;
    transition: all 0.3s ease;
}
.whatsapp-float-btn:hover {
    background-color: #128C7E;
    transform: scale(1.1);
}
@media (max-width: 768px) {
    .whatsapp-float-btn {
        width: 50px;
        height: 50px;
        bottom: 20px;
        left: 20px;
    }
    .whatsapp-float-btn svg {
        width: 24px !important;
        height: 24px !important;
    }
}


footer {
    background-color: #1a1a1a;
    color: #fff;
    padding: 20px 0;
    text-align: center;
}

.footer-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 15px;

    flex-direction: column;
    align-items: center;
    gap: 10px;

.social-icons {
    display: flex;
    align-items: center;
    gap: 15px; /* المسافة بين الأيقونات */
}

.social-icons span {
    font-size: 14px;
    color: #ccc;
}

.social-icons a {
    color: #fff;
    font-size: 20px; /* حجم الأيقونات */
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 40px;
    height: 40px;
    border-radius: 50%; /* جعل الخلفية دائرية عند الـ hover */
    background: rgba(255, 255, 255, 0.1);
}

/* ألوان البراند عند مرور الماوس */
.social-icons a:hover {

.social-icons a[title="Facebook"]{

}

.social-icons a[title="WhatsApp"]{
    background-color: #25D366;
}
